{% extends "layout.html" %}
{% block title %}
  OIME: Edit Comment ({% comment.proposal %})
{% endblock title %}
{% block layout-content %}
  <h2>Edit Comment</h2>
  <p class="text-muted">
    On: <a href="{{ comment.proposal.get_absolute_url }}">{{ comment.proposal }}</a>
  </p>
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">{{ form.content }}</div>
    <button type="submit" class="btn btn-primary">Save</button>
    <hr />
    <a href="{{ comment.proposal.get_absolute_url }}"
       class="btn btn-outline-secondary ms-2">Cancel</a>
  </form>
{% endblock layout-content %}
